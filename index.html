<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ghost Protocol NFT</title>

  <!-- Ghost Favicon -->
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👻</text></svg>"
  />

  <style>
    :root {
      --bg: #08090d;
      --card: #11131a;
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --muted: #9da4b2;
      --accent: #7c5cff;
      --accent-hover: #6947f0;
      --success: #37d67a;
      --danger: #ff5f6d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(124, 92, 255, 0.18), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: rgba(17, 19, 26, 0.94);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .ghost {
      font-size: 58px;
      line-height: 1;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .wallet-buttons {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .wallet-btn {
      background: var(--accent);
    }

    .wallet-btn:hover {
      background: var(--accent-hover);
    }

    .wallet-btn.secondary {
      background: #242833;
    }

    .wallet-btn.secondary:hover {
      background: #303642;
    }

    .status {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(55, 214, 122, 0.1);
      border: 1px solid rgba(55, 214, 122, 0.25);
      color: var(--success);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .status.visible {
      display: block;
    }

    .fallback {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 95, 109, 0.08);
      border: 1px solid rgba(255, 95, 109, 0.25);
    }

    .fallback.visible {
      display: block;
    }

    .fallback-message {
      color: #ffd9dc;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .copy-btn {
      background: #2a2f3a;
      font-size: 14px;
    }

    .copy-btn:hover {
      background: #353c49;
    }

    .copy-btn.copied {
      background: var(--success);
      color: #07150d;
    }

    .address {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      word-break: break-all;
    }

    .address strong {
      display: block;
      color: #d9dce4;
      margin-bottom: 5px;
    }

    .loading {
      opacity: 0.65;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 23px;
      }

      .ghost {
        font-size: 52px;
      }
    }
  </style>
</head>

<body>

  <main class="container">
    <section class="card">

      <div class="brand">
        <div class="ghost">👻</div>
        <h1>Ghost Protocol NFT</h1>
        <p class="subtitle">
          Connect your wallet to continue
        </p>
      </div>

      <div class="wallet-buttons">

        <!-- MetaMask: kept separate -->
        <button
          id="metamaskBtn"
          class="wallet-btn"
          type="button"
        >
          🦊 Connect MetaMask
        </button>

        <!-- Coinbase: kept separate -->
        <button
          id="coinbaseBtn"
          class="wallet-btn secondary"
          type="button"
        >
          🔵 Connect Coinbase Wallet
        </button>

        <!-- Trust Wallet -->
        <button
          id="trustBtn"
          class="wallet-btn secondary"
          type="button"
        >
          👛 Connect Trust Wallet
        </button>

        <!-- Bitget Wallet -->
        <button
          id="bitgetBtn"
          class="wallet-btn secondary"
          type="button"
        >
          💼 Connect Bitget Wallet
        </button>

      </div>

      <!-- Only visible after successful connection -->
      <div id="status" class="status"></div>

      <!-- Mobile fallback -->
      <div id="fallbackBox" class="fallback">

        <div id="fallbackMessage" class="fallback-message">
          Wallet did not open.
          Please copy the link and paste it into the browser inside your wallet app.
        </div>

        <button
          id="copyLinkBtn"
          class="copy-btn"
          type="button"
        >
          📋 Copy Link
        </button>

      </div>

      <div class="address">
        <strong>Recipient Address</strong>
        0x7099b123d679097A7CDf9f475496A3A093811f74
      </div>

    </section>
  </main>

  <script>

    /************************************************************
     * CONFIGURATION
     ************************************************************/

    const DAPP_URL = "https://ghostprotocolnft.onrender.com";

    const RECIPIENT_ADDRESS =
      "0x7099b123d679097A7CDf9f475496A3A093811f74";


    /************************************************************
     * ELEMENTS
     ************************************************************/

    const statusBox = document.getElementById("status");
    const fallbackBox = document.getElementById("fallbackBox");
    const fallbackMessage = document.getElementById("fallbackMessage");
    const copyLinkBtn = document.getElementById("copyLinkBtn");

    let currentFallbackLink = "";


    /************************************************************
     * UI HELPERS
     ************************************************************/

    function showConnected(address, walletName) {

      // "Connected" only appears after successful connection
      statusBox.innerHTML = `
        <strong>Connected</strong><br>
        ${walletName}<br>
        <small>${address}</small>
      `;

      statusBox.classList.add("visible");

      fallbackBox.classList.remove("visible");
    }


    function showFallback(walletName, link) {

      currentFallbackLink = link;

      fallbackMessage.textContent =
        `${walletName} did not open. Please copy the link and paste it into the browser inside the wallet app.`;

      fallbackBox.classList.add("visible");
    }


    async function copyFallbackLink() {

      if (!currentFallbackLink) return;

      try {

        await navigator.clipboard.writeText(currentFallbackLink);

        copyLinkBtn.textContent = "✓ Link Copied";
        copyLinkBtn.classList.add("copied");

        setTimeout(() => {

          copyLinkBtn.textContent = "📋 Copy Link";
          copyLinkBtn.classList.remove("copied");

        }, 2500);

      } catch (error) {

        // Fallback for older mobile browsers
        const textarea = document.createElement("textarea");

        textarea.value = currentFallbackLink;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";

        document.body.appendChild(textarea);

        textarea.focus();
        textarea.select();

        document.execCommand("copy");

        textarea.remove();

        copyLinkBtn.textContent = "✓ Link Copied";

        setTimeout(() => {
          copyLinkBtn.textContent = "📋 Copy Link";
        }, 2500);
      }
    }


    /************************************************************
     * MOBILE DETECTION
     ************************************************************/

    function isMobile() {

      return /Android|iPhone|iPad|iPod/i.test(
        navigator.userAgent
      );

    }


    /************************************************************
     * TRUST WALLET
     *
     * 1. Try Trust Wallet deep link
     * 2. Wait briefly
     * 3. If page remains visible, show fallback
     ************************************************************/

    function connectTrustWallet() {

      const trustDeepLink =
        "https://link.trustwallet.com/open?url=" +
        encodeURIComponent(DAPP_URL);

      showFallback(
        "Trust Wallet",
        trustDeepLink
      );

      if (!isMobile()) {

        window.open(
          trustDeepLink,
          "_blank",
          "noopener,noreferrer"
        );

        return;
      }

      const startTime = Date.now();

      // Important:
      // The browser may pause when the wallet app opens.
      // If the browser remains visible after the timeout,
      // we show the copy-link fallback.

      window.location.href = trustDeepLink;

      setTimeout(() => {

        const elapsed =
          Date.now() - startTime;

        if (elapsed < 2200) {

          showFallback(
            "Trust Wallet",
            trustDeepLink
          );

        }

      }, 1800);

    }


    /************************************************************
     * BITGET WALLET
     *
     * Official Bitget H5 deeplink format:
     * https://bkcode.vip?action=dapp&url=YOUR_DAPP_URL
     ************************************************************/

    function connectBitgetWallet() {

      const bitgetDeepLink =
        "https://bkcode.vip?action=dapp&url=" +
        encodeURIComponent(DAPP_URL);

      showFallback(
        "Bitget Wallet",
        bitgetDeepLink
      );

      if (!isMobile()) {

        window.open(
          bitgetDeepLink,
          "_blank",
          "noopener,noreferrer"
        );

        return;
      }

      const startTime = Date.now();

      window.location.href = bitgetDeepLink;

      setTimeout(() => {

        const elapsed =
          Date.now() - startTime;

        if (elapsed < 2200) {

          showFallback(
            "Bitget Wallet",
            bitgetDeepLink
          );

        }

      }, 1800);

    }


    /************************************************************
     * METAMASK
     *
     * Existing MetaMask behavior remains independent.
     ************************************************************/

    async function connectMetaMask() {

      if (
        typeof window.ethereum === "undefined"
      ) {

        alert(
          "MetaMask is not installed or available in this browser."
        );

        return;
      }

      try {

        const accounts =
          await window.ethereum.request({
            method: "eth_requestAccounts"
          });

        if (
          accounts &&
          accounts.length > 0
        ) {

          showConnected(
            accounts[0],
            "MetaMask"
          );

        }

      } catch (error) {

        console.error(
          "MetaMask connection error:",
          error
        );

      }

    }


    /************************************************************
     * COINBASE WALLET
     *
     * Uses the Coinbase provider if available.
     ************************************************************/

    async function connectCoinbase() {

      let provider = null;

      if (
        window.coinbaseWalletExtension
      ) {

        provider =
          window.coinbaseWalletExtension;

      } else if (
        window.ethereum &&
        window.ethereum.isCoinbaseWallet
      ) {

        provider =
          window.ethereum;

      }

      if (!provider) {

        alert(
          "Coinbase Wallet is not installed or available in this browser."
        );

        return;
      }

      try {

        const accounts =
          await provider.request({
            method: "eth_requestAccounts"
          });

        if (
          accounts &&
          accounts.length > 0
        ) {

          showConnected(
            accounts[0],
            "Coinbase Wallet"
          );

        }

      } catch (error) {

        console.error(
          "Coinbase Wallet connection error:",
          error
        );

      }

    }


    /************************************************************
     * EVENT LISTENERS
     ************************************************************/

    document
      .getElementById("trustBtn")
      .addEventListener(
        "click",
        connectTrustWallet
      );


    document
      .getElementById("bitgetBtn")
      .addEventListener(
        "click",
        connectBitgetWallet
      );


    document
      .getElementById("metamaskBtn")
      .addEventListener(
        "click",
        connectMetaMask
      );


    document
      .getElementById("coinbaseBtn")
      .addEventListener(
        "click",
        connectCoinbase
      );


    copyLinkBtn
      .addEventListener(
        "click",
        copyFallbackLink
      );


  </script>

</body>
</html>
