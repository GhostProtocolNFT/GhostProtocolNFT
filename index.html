<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ghost Protocol NFT</title>

  <!-- Ghost Favicon -->
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>"
  >

  <style>
    :root {
      --bg: #08090d;
      --card: #11131a;
      --border: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: #9da4b2;
      --accent: #7657ff;
      --accent-hover: #6345ed;
      --success: #37d67a;
      --danger: #ff5f6d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;

      background:
        radial-gradient(
          circle at top,
          rgba(118, 87, 255, 0.2),
          transparent 45%
        ),
        var(--bg);

      color: var(--text);

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: rgba(17, 19, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;

      box-shadow:
        0 25px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.03);

      backdrop-filter: blur(20px);
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .ghost {
      font-size: 60px;
      line-height: 1;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .wallet-buttons {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .wallet-button {
      width: 100%;
      min-height: 56px;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;

      border: 0;
      border-radius: 14px;

      background: #242833;
      color: white;

      font-size: 15px;
      font-weight: 700;

      cursor: pointer;

      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .wallet-button:hover {
      background: #303642;
      transform: translateY(-1px);
    }

    .wallet-button:active {
      transform: translateY(0);
    }

    .wallet-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .status {
      display: none;

      margin-top: 20px;
      padding: 15px;

      border-radius: 13px;

      background: rgba(55,214,122,0.1);
      border: 1px solid rgba(55,214,122,0.25);

      color: var(--success);

      font-size: 14px;
      line-height: 1.6;

      word-break: break-word;
    }

    .status.visible {
      display: block;
    }

    .fallback {
      display: none;

      margin-top: 18px;
      padding: 16px;

      border-radius: 14px;

      background: rgba(255,95,109,0.08);
      border: 1px solid rgba(255,95,109,0.25);
    }

    .fallback.visible {
      display: block;
    }

    .fallback-message {
      color: #ffd9dc;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .copy-button {
      width: 100%;
      min-height: 48px;

      border: 0;
      border-radius: 12px;

      background: #2a2f3a;
      color: white;

      font-size: 14px;
      font-weight: 700;

      cursor: pointer;
    }

    .copy-button:hover {
      background: #363d49;
    }

    .copy-button.copied {
      background: var(--success);
      color: #07150d;
    }

    .address {
      margin-top: 22px;
      padding-top: 18px;

      border-top: 1px solid rgba(255,255,255,0.08);

      text-align: center;

      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;

      word-break: break-all;
    }

    .address strong {
      display: block;
      color: #d9dce4;
      margin-bottom: 5px;
    }

    @media (max-width: 480px) {

      .card {
        padding: 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 23px;
      }

      .ghost {
        font-size: 52px;
      }

    }
  </style>
</head>

<body>

  <main class="container">

    <section class="card">

      <div class="brand">

        <div class="ghost">👻</div>

        <h1>Ghost Protocol NFT</h1>

        <p class="subtitle">
          Connect your wallet to continue
        </p>

      </div>


      <div class="wallet-buttons">

        <!-- METAMASK -->
        <button
          id="metamaskBtn"
          class="wallet-button"
          type="button"
        >

          <img
            class="wallet-logo"
            src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg"
            alt="MetaMask"
          >

          <span>MetaMask</span>

        </button>


        <!-- COINBASE WALLET -->
        <button
          id="coinbaseBtn"
          class="wallet-button"
          type="button"
        >

          <img
            class="wallet-logo"
            src="https://avatars.githubusercontent.com/u/18060234?s=200&v=4"
            alt="Coinbase Wallet"
          >

          <span>Coinbase Wallet</span>

        </button>


        <!-- TRUST WALLET -->
        <button
          id="trustBtn"
          class="wallet-button"
          type="button"
        >

          <img
            class="wallet-logo"
            src="https://trustwallet.com/assets/images/media/assets/TWT.png"
            alt="Trust Wallet"
          >

          <span>Trust Wallet</span>

        </button>


        <!-- BITGET WALLET -->
        <button
          id="bitgetBtn"
          class="wallet-button"
          type="button"
        >

          <img
            class="wallet-logo"
            src="https://web3.bitget.com/favicon.ico"
            alt="Bitget Wallet"
          >

          <span>Bitget Wallet</span>

        </button>

      </div>


      <!-- ONLY VISIBLE AFTER SUCCESSFUL CONNECTION -->
      <div
        id="status"
        class="status"
      ></div>


      <!-- FALLBACK -->
      <div
        id="fallbackBox"
        class="fallback"
      >

        <div
          id="fallbackMessage"
          class="fallback-message"
        >
          Wallet did not open.
        </div>


        <button
          id="copyLinkBtn"
          class="copy-button"
          type="button"
        >
          📋 Copy Link
        </button>

      </div>


      <div class="address">

        <strong>Recipient Address</strong>

        0x7099b123d679097A7CDf9f475496A3A093811f74

      </div>

    </section>

  </main>


  <script>

    /*
    ============================================================
    CONFIGURATION
    ============================================================
    */

    const DAPP_URL =
      "https://ghostprotocolnft.onrender.com";


    const RECIPIENT_ADDRESS =
      "0x7099b123d679097A7CDf9f475496A3A093811f74";


    /*
    ============================================================
    ELEMENTS
    ============================================================
    */

    const statusBox =
      document.getElementById("status");

    const fallbackBox =
      document.getElementById("fallbackBox");

    const fallbackMessage =
      document.getElementById("fallbackMessage");

    const copyLinkBtn =
      document.getElementById("copyLinkBtn");


    let currentFallbackLink = "";


    /*
    ============================================================
    SHOW CONNECTED
    ============================================================
    */

    function showConnected(
      address,
      walletName
    ) {

      statusBox.innerHTML = `

        <strong>Connected</strong><br>

        ${walletName}<br>

        <small>${address}</small>

      `;

      statusBox.classList.add(
        "visible"
      );

      fallbackBox.classList.remove(
        "visible"
      );

    }


    /*
    ============================================================
    SHOW FALLBACK
    ============================================================
    */

    function showFallback(
      walletName,
      link
    ) {

      currentFallbackLink =
        link;

      fallbackMessage.textContent =
        `${walletName} did not open. Please copy the link and paste it into the browser inside the wallet app.`;

      fallbackBox.classList.add(
        "visible"
      );

    }


    /*
    ============================================================
    COPY LINK
    ============================================================
    */

    async function copyFallbackLink() {

      if (
        !currentFallbackLink
      ) {

        return;

      }


      try {

        await navigator.clipboard.writeText(
          currentFallbackLink
        );

        copyLinkBtn.textContent =
          "✓ Link Copied";

        copyLinkBtn.classList.add(
          "copied"
        );


        setTimeout(() => {

          copyLinkBtn.textContent =
            "📋 Copy Link";

          copyLinkBtn.classList.remove(
            "copied"
          );

        }, 2500);


      } catch (error) {

        const textarea =
          document.createElement(
            "textarea"
          );


        textarea.value =
          currentFallbackLink;

        textarea.style.position =
          "fixed";

        textarea.style.opacity =
          "0";


        document.body.appendChild(
          textarea
        );

        textarea.focus();

        textarea.select();

        document.execCommand(
          "copy"
        );

        textarea.remove();


        copyLinkBtn.textContent =
          "✓ Link Copied";


        setTimeout(() => {

          copyLinkBtn.textContent =
            "📋 Copy Link";

        }, 2500);

      }

    }


    /*
    ============================================================
    TRUST WALLET
    ============================================================
    */

    function connectTrustWallet() {


      /*
      IMPORTANT:

      Correct Trust Wallet DApp Browser deep link:

      open_url

      NOT:

      open
      */


      const trustLink =

        "https://link.trustwallet.com/open_url" +

        "?coin_id=60" +

        "&url=" +

        encodeURIComponent(
          DAPP_URL
        );


      showFallback(
        "Trust Wallet",
        trustLink
      );


      /*
      TRY TO OPEN TRUST WALLET
      */

      window.location.href =
        trustLink;

    }


    /*
    ============================================================
    BITGET WALLET
    ============================================================
    */

    function connectBitgetWallet() {


      const bitgetLink =

        "https://bkcode.vip" +

        "?action=dapp" +

        "&url=" +

        encodeURIComponent(
          DAPP_URL
        );


      showFallback(
        "Bitget Wallet",
        bitgetLink
      );


      window.location.href =
        bitgetLink;

    }


    /*
    ============================================================
    METAMASK
    ============================================================
    */

    async function connectMetaMask() {


      if (
        typeof window.ethereum ===
        "undefined"
      ) {

        alert(
          "MetaMask is not installed or available in this browser."
        );

        return;

      }


      try {


        const accounts =

          await window.ethereum.request({

            method:
              "eth_requestAccounts"

          });


        if (

          accounts &&

          accounts.length > 0

        ) {


          showConnected(

            accounts[0],

            "MetaMask"

          );

        }


      } catch (error) {


        console.error(

          "MetaMask connection error:",

          error

        );

      }

    }


    /*
    ============================================================
    COINBASE WALLET
    ============================================================
    */

    async function connectCoinbase() {


      let provider =
        null;


      if (

        window.coinbaseWalletExtension

      ) {


        provider =
          window.coinbaseWalletExtension;


      } else if (

        window.ethereum &&

        window.ethereum.isCoinbaseWallet

      ) {


        provider =
          window.ethereum;

      }


      if (!provider) {


        alert(

          "Coinbase Wallet is not installed or available in this browser."

        );


        return;

      }


      try {


        const accounts =

          await provider.request({

            method:
              "eth_requestAccounts"

          });


        if (

          accounts &&

          accounts.length > 0

        ) {


          showConnected(

            accounts[0],

            "Coinbase Wallet"

          );

        }


      } catch (error) {


        console.error(

          "Coinbase Wallet connection error:",

          error

        );

      }

    }


    /*
    ============================================================
    EVENT LISTENERS
    ============================================================
    */

    document

      .getElementById(
        "trustBtn"
      )

      .addEventListener(

        "click",

        connectTrustWallet

      );


    document

      .getElementById(
        "bitgetBtn"
      )

      .addEventListener(

        "click",

        connectBitgetWallet

      );


    document

      .getElementById(
        "metamaskBtn"
      )

      .addEventListener(

        "click",

        connectMetaMask

      );


    document

      .getElementById(
        "coinbaseBtn"
      )

      .addEventListener(

        "click",

        connectCoinbase

      );


    copyLinkBtn

      .addEventListener(

        "click",

        copyFallbackLink

      );

  </script>

</body>
</html>
