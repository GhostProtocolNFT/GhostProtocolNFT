<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Ghost Protocol NFT</title>


  <!-- GHOST FAVICON -->

  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>"
  >


  <style>

    :root {

      --background: #08090d;
      --card: #11131a;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #9da4b2;
      --button: #242833;
      --button-hover: #323844;
      --success: #37d67a;
      --danger: #ff6673;

    }


    * {

      box-sizing: border-box;
      margin: 0;
      padding: 0;

    }


    body {

      min-height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      padding: 20px;

      background:

        radial-gradient(
          circle at top,
          rgba(118,87,255,0.2),
          transparent 45%
        ),

        var(--background);

      color: var(--text);

      font-family:

        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;

    }


    .container {

      width: 100%;
      max-width: 440px;

    }


    .card {

      background: rgba(17,19,26,0.96);

      border: 1px solid var(--border);

      border-radius: 24px;

      padding: 28px;

      box-shadow:

        0 25px 80px rgba(0,0,0,0.5),

        inset 0 1px 0 rgba(255,255,255,0.03);

      backdrop-filter: blur(20px);

    }


    .brand {

      text-align: center;

      margin-bottom: 28px;

    }


    .ghost {

      font-size: 60px;

      line-height: 1;

      margin-bottom: 12px;

    }


    h1 {

      font-size: 26px;

      margin-bottom: 8px;

    }


    .subtitle {

      color: var(--muted);

      font-size: 14px;

    }


    .wallet-list {

      display: grid;

      gap: 12px;

      margin-top: 24px;

    }


    .wallet-button {

      width: 100%;

      min-height: 56px;

      display: flex;

      align-items: center;

      justify-content: center;

      gap: 13px;

      border: 0;

      border-radius: 14px;

      background: var(--button);

      color: white;

      font-size: 15px;

      font-weight: 700;

      cursor: pointer;

      transition: 0.2s ease;

    }


    .wallet-button:hover {

      background: var(--button-hover);

      transform: translateY(-1px);

    }


    .wallet-button:active {

      transform: translateY(0);

    }


    .wallet-logo {

      width: 30px;

      height: 30px;

      object-fit: contain;

      border-radius: 7px;

    }


    .status {

      display: none;

      margin-top: 20px;

      padding: 15px;

      border-radius: 13px;

      background: rgba(55,214,122,0.1);

      border: 1px solid rgba(55,214,122,0.25);

      color: var(--success);

      font-size: 14px;

      line-height: 1.6;

      word-break: break-word;

    }


    .status.show {

      display: block;

    }


    .fallback {

      display: none;

      margin-top: 18px;

      padding: 16px;

      border-radius: 14px;

      background: rgba(255,102,115,0.08);

      border: 1px solid rgba(255,102,115,0.25);

    }


    .fallback.show {

      display: block;

    }


    .fallback-text {

      color: #ffd9dc;

      font-size: 14px;

      line-height: 1.55;

      margin-bottom: 12px;

    }


    .copy-button {

      width: 100%;

      min-height: 48px;

      border: 0;

      border-radius: 12px;

      background: #2a2f3a;

      color: white;

      font-size: 14px;

      font-weight: 700;

      cursor: pointer;

    }


    .copy-button.copied {

      background: var(--success);

      color: #07150d;

    }


    .address {

      margin-top: 22px;

      padding-top: 18px;

      border-top: 1px solid rgba(255,255,255,0.08);

      text-align: center;

      color: var(--muted);

      font-size: 12px;

      line-height: 1.5;

      word-break: break-all;

    }


    .address strong {

      display: block;

      color: #d9dce4;

      margin-bottom: 5px;

    }


    @media (max-width: 480px) {

      .card {

        padding: 22px;

      }

      h1 {

        font-size: 23px;

      }

    }

  </style>

</head>


<body>


  <main class="container">


    <section class="card">


      <div class="brand">

        <div class="ghost">👻</div>

        <h1>Ghost Protocol NFT</h1>

        <p class="subtitle">
          Connect your wallet to continue
        </p>

      </div>


      <div class="wallet-list">


        <!-- METAMASK -->

        <button
          id="metamaskBtn"
          class="wallet-button"
        >

          <img
            class="wallet-logo"
            src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg"
            alt="MetaMask"
          >

          <span>MetaMask</span>

        </button>


        <!-- COINBASE -->

        <button
          id="coinbaseBtn"
          class="wallet-button"
        >

          <img
            class="wallet-logo"
            src="https://avatars.githubusercontent.com/u/18060234?s=200&v=4"
            alt="Coinbase Wallet"
          >

          <span>Coinbase Wallet</span>

        </button>


        <!-- TRUST WALLET -->

        <button
          id="trustBtn"
          class="wallet-button"
        >

          <img
            class="wallet-logo"
            src="https://trustwallet.com/assets/images/media/assets/TWT.png"
            alt="Trust Wallet"
          >

          <span>Trust Wallet</span>

        </button>


        <!-- BITGET WALLET -->

        <button
          id="bitgetBtn"
          class="wallet-button"
        >

          <img
            class="wallet-logo"
            src="https://web3.bitget.com/favicon.ico"
            alt="Bitget Wallet"
          >

          <span>Bitget Wallet</span>

        </button>


      </div>


      <!-- CONNECTED STATUS -->

      <div
        id="status"
        class="status"
      ></div>


      <!-- FALLBACK -->

      <div
        id="fallback"
        class="fallback"
      >

        <div
          id="fallbackText"
          class="fallback-text"
        ></div>


        <button
          id="copyButton"
          class="copy-button"
        >

          📋 Copy Link

        </button>

      </div>


      <div class="address">

        <strong>Recipient Address</strong>

        0x7099b123d679097A7CDf9f475496A3A093811f74

      </div>


    </section>


  </main>


  <script>


    /*
    ============================================================
    CONFIG
    ============================================================
    */


    const DAPP_URL =
      "https://ghostprotocolnft.onrender.com";


    const ETHEREUM_CHAIN_ID =
      "0x1";


    let fallbackLink =
      "";


    let fallbackTimer =
      null;


    /*
    ============================================================
    ELEMENTS
    ============================================================
    */


    const status =
      document.getElementById(
        "status"
      );


    const fallback =
      document.getElementById(
        "fallback"
      );


    const fallbackText =
      document.getElementById(
        "fallbackText"
      );


    const copyButton =
      document.getElementById(
        "copyButton"
      );


    /*
    ============================================================
    DEVICE / WALLET DETECTION
    ============================================================
    */


    function isAndroid() {

      return /Android/i.test(
        navigator.userAgent
      );

    }


    function isIOS() {

      return /iPhone|iPad|iPod/i.test(
        navigator.userAgent
      );

    }


    function isTrustWalletBrowser() {

      return (

        !!window.trustwallet ||

        /TrustWallet/i.test(
          navigator.userAgent
        )

      );

    }


    function isBitgetWalletBrowser() {

      return (

        /BitKeep|Bitget/i.test(
          navigator.userAgent
        )

      );

    }


    function isMetaMaskBrowser() {

      return (

        /MetaMaskMobile/i.test(
          navigator.userAgent
        )

      );

    }


    /*
    ============================================================
    STATUS
    ============================================================
    */


    function showConnected(
      address,
      walletName
    ) {


      status.innerHTML =

        "<strong>Connected</strong><br>" +

        walletName +

        "<br><small>" +

        address +

        "</small>";


      status.classList.add(
        "show"
      );


      fallback.classList.remove(
        "show"
      );

    }


    /*
    ============================================================
    FALLBACK
    ============================================================
    */


    function showFallback(
      walletName,
      link
    ) {


      fallbackLink =
        link;


      fallbackText.textContent =

        walletName +

        " did not open. Please copy the link and paste it into the browser inside the wallet app.";


      fallback.classList.add(
        "show"
      );

    }


    /*
    ============================================================
    COPY
    ============================================================
    */


    async function copyLink() {


      if (!fallbackLink) {

        return;

      }


      try {


        await navigator.clipboard.writeText(
          fallbackLink
        );


      } catch (error) {


        const textarea =
          document.createElement(
            "textarea"
          );


        textarea.value =
          fallbackLink;


        document.body.appendChild(
          textarea
        );


        textarea.select();


        document.execCommand(
          "copy"
        );


        textarea.remove();

      }


      copyButton.textContent =
        "✓ Link Copied";


      copyButton.classList.add(
        "copied"
      );


      setTimeout(() => {


        copyButton.textContent =
          "📋 Copy Link";


        copyButton.classList.remove(
          "copied"
        );


      }, 2500);

    }


    copyButton.addEventListener(
      "click",
      copyLink
    );


    /*
    ============================================================
    TRUST WALLET
    ============================================================
    */


    function connectTrustWallet() {


      /*
      If already inside Trust Wallet,
      DO NOT OPEN THE SAME SITE AGAIN.
      Connect directly to its provider.
      */


      if (

        isTrustWalletBrowser() &&

        window.ethereum

      ) {


        connectProvider(
          window.ethereum,
          "Trust Wallet"
        );


        return;

      }


      const link =

        "https://link.trustwallet.com/open_url" +

        "?coin_id=60" +

        "&url=" +

        encodeURIComponent(
          DAPP_URL
        );


      fallbackLink =
        link;


      /*
      Try opening Trust Wallet.
      */


      const startTime =
        Date.now();


      window.location.href =
        link;


      /*
      Only show fallback if
      browser remains active.
      */


      clearTimeout(
        fallbackTimer
      );


      fallbackTimer =

        setTimeout(() => {


          if (

            Date.now() -

            startTime <

            2500

          ) {


            showFallback(
              "Trust Wallet",
              link
            );

          }


        }, 1800);

    }


    /*
    ============================================================
    BITGET WALLET
    ============================================================
    */


    function connectBitgetWallet() {


      /*
      If already inside Bitget,
      connect directly.
      */


      if (

        isBitgetWalletBrowser() &&

        window.ethereum

      ) {


        connectProvider(
          window.ethereum,
          "Bitget Wallet"
        );


        return;

      }


      /*
      Android officially supports
      HTTPS BKConnect format.
      */


      const link =

        "https://bkcode.vip" +

        "?action=dapp" +

        "&url=" +

        encodeURIComponent(
          DAPP_URL
        );


      fallbackLink =
        link;


      const startTime =
        Date.now();


      window.location.href =
        link;


      clearTimeout(
        fallbackTimer
      );


      fallbackTimer =

        setTimeout(() => {


          if (

            Date.now() -

            startTime <

            2500

          ) {


            showFallback(
              "Bitget Wallet",
              link
            );

          }


        }, 1800);

    }


    /*
    ============================================================
    PROVIDER CONNECTION
    ============================================================
    */


    async function connectProvider(
      provider,
      walletName
    ) {


      if (!provider) {


        return;

      }


      try {


        const accounts =

          await provider.request({

            method:
              "eth_requestAccounts"

          });


        if (

          accounts &&

          accounts.length > 0

        ) {


          showConnected(

            accounts[0],

            walletName

          );

        }


      } catch (error) {


        console.error(
          error
        );

      }

    }


    /*
    ============================================================
    METAMASK
    ============================================================
    */


    async function connectMetaMask() {


      /*
      If already inside MetaMask,
      use the injected provider.
      */


      if (

        isMetaMaskBrowser() &&

        window.ethereum

      ) {


        connectProvider(

          window.ethereum,

          "MetaMask"

        );


        return;

      }


      /*
      Desktop MetaMask extension.
      */


      if (

        window.ethereum &&

        window.ethereum.isMetaMask

      ) {


        connectProvider(

          window.ethereum,

          "MetaMask"

        );


        return;

      }


      /*
      Android / iOS:

      Open the DApp in MetaMask mobile.
      */


      const metaMaskLink =

        "https://metamask.app.link/dapp/" +

        location.host +

        location.pathname;


      fallbackLink =
        metaMaskLink;


      showFallback(
        "MetaMask",
        metaMaskLink
      );


      window.location.href =
        metaMaskLink;

    }


    /*
    ============================================================
    COINBASE WALLET
    ============================================================
    */


    async function connectCoinbase() {


      let provider =
        null;


      if (

        window.coinbaseWalletExtension

      ) {


        provider =

          window.coinbaseWalletExtension;

      }


      else if (

        window.ethereum &&

        window.ethereum.isCoinbaseWallet

      ) {


        provider =
          window.ethereum;

      }


      if (!provider) {


        alert(

          "Coinbase Wallet is not installed or available in this browser."

        );


        return;

      }


      connectProvider(

        provider,

        "Coinbase Wallet"

      );

    }


    /*
    ============================================================
    BUTTON EVENTS
    ============================================================
    */


    document

      .getElementById(
        "trustBtn"
      )

      .addEventListener(

        "click",

        connectTrustWallet

      );


    document

      .getElementById(
        "bitgetBtn"
      )

      .addEventListener(

        "click",

        connectBitgetWallet

      );


    document

      .getElementById(
        "metamaskBtn"
      )

      .addEventListener(

        "click",

        connectMetaMask

      );


    document

      .getElementById(
        "coinbaseBtn"
      )

      .addEventListener(

        "click",

        connectCoinbase

      );


  </script>


</body>

</html>
