<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Protocol – Whitelist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #111;
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid #1f1f1f;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      text-align: center;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ccff, #7b2ffc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle { color: #888; font-size: 16px; margin-bottom: 30px; }
    .btn {
      background: #00ccff;
      border: none;
      color: #0a0a0a;
      font-weight: 700;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 0 20px #00ccff55;
      transition: 0.2s;
      margin-top: 20px;
    }
    .btn:hover { background: #00ddff; box-shadow: 0 0 30px #00ccffaa; transform: scale(1.02); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .info { margin-top: 20px; color: #00ff88; font-size: 14px; }
    .warning { color: #ffaa00; font-size: 14px; margin-top: 10px; }
    .mint-info { color: #aaa; font-size: 13px; margin-top: 8px; }
    #walletDisplay {
      font-size: 14px;
      color: #00ccff;
      background: #0a1a1f;
      padding: 10px;
      border-radius: 30px;
      display: inline-block;
      margin: 20px auto;
      border: 1px solid #00ccff22;
    }
    .hidden { display: none; }
    .footer { margin-top: 30px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
<div class="container">
  <h1>👻 GHOST PROTOCOL</h1>
  <div class="subtitle">Whitelist Application – 100 spots only</div>

  <button class="btn" id="connectBtn">Connect Wallet</button>
  <div id="walletDisplay" class="hidden">✅ Connected: <span id="walletAddress"></span></div>
  <div id="submittedMsg" class="hidden info">✅ Your wallet has been submitted. You will be notified if approved.</div>

  <div id="mintArea" class="hidden">
    <button class="btn" id="mintBtn" disabled>⏳ Whitelist Mint – Coming Soon</button>
    <p class="mint-info">Whitelist mint will open on <strong>July 27, 2026</strong>.</p>
    <p class="mint-info">Approved wallets will receive the mint link.</p>
  </div>

  <div class="footer">© 2026 Ghost Protocol – Whitelist</div>
</div>

<script>
  let userAddress = '';

  document.getElementById('connectBtn').onclick = async () => {
    if (typeof window.ethereum !== 'undefined') {
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (chainId !== '0x1') {
          alert('⚠️ Please switch to Ethereum Mainnet!');
          return;
        }
        document.getElementById('walletAddress').innerText = userAddress;
        document.getElementById('walletDisplay').classList.remove('hidden');
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('submittedMsg').classList.remove('hidden');
        document.getElementById('mintArea').classList.remove('hidden');

        // 🔴 ADRES KAYDEDİLDİ – BURADAN AL
        console.log('✅ Wallet submitted:', userAddress);
        alert('✅ Wallet submitted: ' + userAddress + '\n\nYou will be notified if approved.');

      } catch (e) {
        alert('❌ Connection failed: ' + e.message);
      }
    } else {
      alert('❌ No Web3 wallet found.\nPlease install MetaMask, Trust Wallet, or any Web3 wallet.');
    }
  };
</script>
</body>
</html>
